<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>
      {% if page.title %}{{ page.title }} — {% endif %}
      {{ site.title }}
    </title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="{{ "/assets/css/main.css" | relative_url }}" as="style">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <script src="{{ "/assets/js/mobile-sticky-header.js" | relative_url }}" defer></script>
  </head>
  <body>
    <header class="site-header" role="banner">
      <nav class="nav" aria-label="Main navigation">
        <a class="nav__title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <div class="nav__links">
          <a
            href="{{ "/meetups/" | relative_url }}"
            {% if page.url contains '/meetups/' %}
              aria-current="page"
            {% endif %}
          >
            Meetups
          </a>
          <a
            href="{{ "/conferences/" | relative_url }}"
            {% if page.url contains '/conferences/' %}
              aria-current="page"
            {% endif %}
          >
            Conferences
          </a>
          <a href="https://github.com/{{ site.github_repo }}" class="nav__icon-link" aria-label="GitHub">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.562 21.8 24 17.302 24 12 24 5.373 18.627 0 12 0z"/>
            </svg>
          </a>
        </div>
      </nav>
    </header>

    {% if page.toc %}
      <div class="mobile-sticky-header" aria-label="Guide contents menu" data-mobile-sticky-header>
        <a class="mobile-sticky-header__title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <button
          class="mobile-sticky-header__toggle"
          type="button"
          aria-expanded="false"
          aria-controls="mobile-sticky-menu"
          data-mobile-menu-toggle
        >
          <span class="mobile-sticky-header__toggle-icon" aria-hidden="true"></span>
          <span class="mobile-sticky-header__toggle-label">Contents</span>
        </button>
        <div class="mobile-sticky-header__menu" id="mobile-sticky-menu" data-mobile-menu hidden>
          <nav class="mobile-sticky-header__links" aria-label="Guide navigation">
            <a
              href="{{ "/meetups/" | relative_url }}"
              {% if page.url contains '/meetups/' %}
                aria-current="page"
              {% endif %}
            >
              Meetups
            </a>
            <a
              href="{{ "/conferences/" | relative_url }}"
              {% if page.url contains '/conferences/' %}
                aria-current="page"
              {% endif %}
            >
              Conferences
            </a>
          </nav>
          {% include toc.html variant="toc--sticky" heading="Contents" %}
        </div>
      </div>
    {% endif %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
