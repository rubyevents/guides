url: "https://guides.rubyevents.org"
github_repo: "rubyevents/guides"
github_branch: "main"
baseurl: ""
lang: en
title: "RubyEvents Guides"
tagline: "Start and run Ruby communities"
description: "Practical guides for starting and running Ruby communities."
author:
  name: RubyEvents Guides

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  interviews:
    output: true
    permalink: /interviews/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og.png
  - scope:
      path: ""
      type: interviews
    values:
      layout: interview

exclude:
  - vendor
  - .bundle
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
