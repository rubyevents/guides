url: "https://guides.rubyevents.org"
github_repo: "rubyevents/guides"
github_branch: "main"
baseurl: ""
title: "Ruby Community Guides"
description: "Practical guides for starting and running Ruby communities."

collections:
  interviews:
    output: true
    permalink: /interviews/:name/

defaults:
  - scope:
      path: ""
      type: interviews
    values:
      layout: interview

exclude:
  - vendor
  - .bundle
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
